# discover_nginx.conf — app_discover (recomendaciones entre usuarios) en puerto 8443
# Requiere: nginx_zones.conf (http-level) y nginx_server_params.conf (server-level)
#
# Acceso: https://voltereta.duckdns.org:8443/
#
# Nota: puerto distinto = origen distinto = IndexedDB independiente.
# Para compartir sesiones entre las dos apps, usa el botón
# "Exportar JSON" en una y "Importar JSON" en la otra.

server {
    listen 8443 ssl;
    server_name voltereta.duckdns.org;
    server_tokens off;

    client_max_body_size 10M;

    include /etc/nginx/nginx_server_params.conf;

    set $flask http://mustdiscover:5001;

    # ── Endpoints que llaman a APIs externas (Last.fm, MusicBrainz) ──────────
    location ~* ^/api/(scrobbles|enrich_albums|album_info|friends) {
        limit_req zone=heavy burst=4 nodelay;
        limit_req_status 429;
        proxy_pass $flask;
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    # ── Proxy de portadas (CoverArtArchive) ───────────────────────────────────
    location /api/cover {
        limit_req zone=cover burst=40 nodelay;
        limit_req_status 429;
        proxy_pass $flask;
        proxy_connect_timeout 15s;
        proxy_read_timeout    15s;
    }

    # ── Resto: UI, /api/check_user ────────────────────────────────────────────
    location / {
        limit_req zone=page burst=30 nodelay;
        limit_req_status 429;
        proxy_pass $flask;
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }
}
