services:
  flask:
    build:
      context: ./
      dockerfile: Dockerfile.flask
    container_name: mustlisten
    restart: unless-stopped
    environment:
      - LASTFM_API_KEY=${LASTFM_API_KEY}
    volumes:
      - ./db:/app/db
    networks:
      - musica

  nginx:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8085:80"
      - "8443:443"
    depends_on:
      - flask
    networks:
      - musica

networks:
  musica:
    driver: bridge
