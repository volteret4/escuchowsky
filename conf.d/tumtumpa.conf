# tumtumpa.conf — app_discover (recomendaciones entre usuarios)
# Dominio: tumtumpa.duckdns.org → container tumtumpa:5001

server {
    listen 80;
    server_name tumtumpa.duckdns.org;
    server_tokens off;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tumtumpa.duckdns.org;
    server_tokens off;

    client_max_body_size 10M;

    ssl_certificate     /etc/nginx/ssl/tumtumpa_cert.pem;
    ssl_certificate_key /etc/nginx/ssl/tumtumpa_key.pem;

    include /etc/nginx/conf.d/server_params.conf;

    set $flask http://tumtumpa:5001;

    # ── Endpoints que llaman a APIs externas ─────────────────────────────────
    location ~* ^/api/(scrobbles|enrich_albums|album_info|friends) {
        limit_req zone=heavy burst=4 nodelay;
        limit_req_status 429;
        proxy_pass $flask;
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    # ── Proxy de portadas (CoverArtArchive) ───────────────────────────────────
    location /api/cover {
        limit_req zone=cover burst=40 nodelay;
        limit_req_status 429;
        proxy_pass $flask;
        proxy_connect_timeout 15s;
        proxy_read_timeout    15s;
    }

    # ── Resto: UI, /api/check_user ────────────────────────────────────────────
    location / {
        limit_req zone=page burst=30 nodelay;
        limit_req_status 429;
        proxy_pass $flask;
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }
}
