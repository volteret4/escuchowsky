# musica - Hub musical con Flask

# ── Rate limiting zones ────────────────────────────────────────────────────────
# heavy: endpoints que llaman a Last.fm / MusicBrainz (caros, limitados)
limit_req_zone $binary_remote_addr zone=heavy:10m rate=6r/m;
# cover: proxy de portadas desde CoverArtArchive
limit_req_zone $binary_remote_addr zone=cover:10m rate=60r/m;
# page: resto de rutas (UI, colecciones, etc.)
limit_req_zone $binary_remote_addr zone=page:10m  rate=60r/m;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name voltereta.duckdns.org;
    server_tokens off;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name voltereta.duckdns.org;
    server_tokens off;

    client_max_body_size 10M;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # ── Docker internal DNS; variable forces lazy resolution ──────────────────
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $flask http://mustlisten:5001;

    # ── Proxy headers (shared) ────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_redirect   off;
    proxy_buffering  off;
    proxy_cache      off;

    # ── Endpoints que llaman a APIs externas (Last.fm, MusicBrainz) ──────────
    # 6 req/min por IP, burst de 4 — limita abuso de la API key
    location ~* ^/api/(scrobbles|enrich_albums|album_info|friends) {
        limit_req zone=heavy burst=4 nodelay;
        limit_req_status 429;
        proxy_pass $flask;
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    # ── Proxy de portadas (CoverArtArchive) ───────────────────────────────────
    location /api/cover {
        limit_req zone=cover burst=40 nodelay;
        limit_req_status 429;
        proxy_pass $flask;
        proxy_connect_timeout 15s;
        proxy_read_timeout    15s;
    }

    # ── Resto: UI, /api/collections, /api/collection, /api/check_user ─────────
    location / {
        limit_req zone=page burst=30 nodelay;
        limit_req_status 429;
        proxy_pass $flask;
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }
}
