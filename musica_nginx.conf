# musica - Hub musical con Flask
server {
    listen 80;
    server_name voltereta.duckdns.org;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    # listen [::]:443 ssl;
    server_name voltereta.duckdns.org;

    # include /var/nginx/ssl.conf;

    client_max_body_size 100M;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Proxy al servidor Flask - TODAS LAS RUTAS
    # 127.0.0.11 = DNS interno de Docker; la variable fuerza resolución lazy
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $flask http://mustlisten:5001;

    location / {
        proxy_pass $flask;

        # Headers necesarios para Flask
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts largos para descargas
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Desactivar buffering
        proxy_buffering off;
        proxy_cache off;

        # No redireccionar
        proxy_redirect off;
    }
}
